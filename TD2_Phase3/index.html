<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>Gestionnaire de Stock</title>
        <link href="styles.css" rel="stylesheet">
        <script src = "script.js" ></script>
    </head>
    <body>
        <div class = "header">
            <h1>Gestionnaire de Stock</h1>
            <nav>
                <input type = "search" placeholder = "Rechercher un produit..." name = "Rechercher" oninput = "searchProducts()">
            </nav>
        </div>
        <section class="catalogue" id="catalogue">
            <!-- Le catalogue des produits sera affiché ici -->
        </section>

        <form onsubmit="return false">
            <label for="nom">Nom du produit :</label>
            <input type="text" id="name" name="nom" required><br><br>
            <label for="description">Description :</label>
            <input type="text" id="desc" name="description" required><br><br>
            <label for="Prix">Prix :</label>
            <input type="number" id="price" name="Prix" required><br><br>
            <label for="Statut">Statut :</label>
            <select id="status" name="Statut" required>
                <option value="En Stock">En Stock</option>
                <option value="Rupture de Stock">Rupture de Stock</option>
            </select><br><br>
            <label for="image">URL de l'image :</label>
            <input type="url" id="image" name="image" required><br><br>
            <input type="submit" value="Ajouter le produit" onclick="addProduct()">
        </form>
    
    </body>
</html>
